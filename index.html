<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coca-Cola Trace Pro MVP</title>
  <style>
    :root{
      --red:#d60000;
      --dark:#111827;
      --gray:#f3f4f6;
      --card:#ffffff;
      --green:#16a34a;
      --yellow:#f59e0b;
      --blue:#2563eb;
      --purple:#7c3aed;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial, Helvetica, sans-serif;background:var(--gray);color:#111}
    button,input,select,textarea{font:inherit}
    .screen{min-height:100vh}
    .login{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#d60000,#6b0000);
      padding:24px;
    }
    .login-card{
      width:720px;
      max-width:100%;
      background:#fff;
      border-radius:30px;
      padding:42px;
      box-shadow:0 30px 70px #0006;
    }
    .brand{
      color:var(--red);
      font-size:42px;
      font-weight:900;
      text-align:center;
      margin-bottom:8px;
    }
    .subtitle{text-align:center;font-size:22px;font-weight:700;margin-bottom:28px}
    .login-card input{
      width:100%;
      padding:20px;
      margin:10px 0;
      border:2px solid #ddd;
      border-radius:16px;
      font-size:24px;
    }
    .btn{
      border:0;
      border-radius:18px;
      padding:18px 24px;
      font-weight:900;
      cursor:pointer;
      font-size:22px;
    }
    .btn-red{background:var(--red);color:#fff}
    .btn-green{background:var(--green);color:#fff}
    .btn-gray{background:#fff;border:2px solid #ddd;color:#111}
    .btn-blue{background:var(--blue);color:#fff}
    .topbar{
      background:var(--red);
      color:white;
      padding:18px 28px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 10px 22px #0002;
    }
    .topbar .title{font-size:32px;font-weight:900}
    .topbar .user{text-align:right;font-weight:700;line-height:1.4}
    .wrap{max-width:1250px;margin:0 auto;padding:24px}
    .card{
      background:var(--card);
      border-radius:28px;
      padding:28px;
      box-shadow:0 12px 28px #0001;
      border:1px solid #e5e7eb;
      margin-bottom:22px;
    }
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
    .tile{
      min-height:180px;
      background:white;
      border:2px solid #e5e7eb;
      border-radius:30px;
      padding:32px;
      font-size:34px;
      font-weight:900;
      text-align:left;
      cursor:pointer;
      box-shadow:0 12px 28px #0001;
    }
    .tile:hover{outline:5px solid #ffd1d1}
    .tile span{display:block;font-size:56px;margin-bottom:16px}
    h1{font-size:38px;margin:0 0 20px}
    h2{font-size:28px;margin:12px 0}
    label{display:block;font-size:15px;text-transform:uppercase;font-weight:900;color:#555;margin-bottom:8px}
    input,select,textarea{
      width:100%;
      padding:16px;
      border:2px solid #ddd;
      border-radius:16px;
      background:#fff;
      font-size:22px;
      margin-bottom:16px;
    }
    textarea{min-height:90px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .metric{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:24px;
      padding:22px;
    }
    .metric .n{font-size:42px;font-weight:900;color:var(--red)}
    .metric .t{font-weight:900;color:#555;text-transform:uppercase}
    .alert{
      border:2px solid #fbbf24;
      background:#fff7ed;
      border-radius:18px;
      padding:18px;
      margin:14px 0;
      font-weight:700;
    }
    .ok{
      border:2px solid #86efac;
      background:#f0fdf4;
      border-radius:18px;
      padding:18px;
      margin:14px 0;
      font-weight:700;
    }
    .option{
      border:3px solid #e5e7eb;
      border-radius:22px;
      padding:18px;
      margin-bottom:12px;
      cursor:pointer;
      background:#fff;
    }
    .option.selected{border-color:var(--red);background:#fff1f1}
    .option b{font-size:24px}
    .small{font-size:14px;color:#666}
    .rack-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px}
    .rack{
      border:3px solid #ddd;
      border-radius:16px;
      padding:10px;
      min-height:95px;
      background:white;
      font-size:13px;
    }
    .rack b{font-size:20px}
    .rack.empty{background:#fff}
    .rack.ok{background:#dcfce7;border-color:#16a34a}
    .rack.mid{background:#fef3c7;border-color:#f59e0b}
    .rack.full{background:#fee2e2;border-color:#dc2626}
    .rack.reserved{background:#dbeafe;border-color:#2563eb}
    .rack.blocked{background:#ede9fe;border-color:#7c3aed}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden}
    th,td{text-align:left;padding:14px;border-bottom:1px solid #eee}
    th{background:#f9fafb}
    .actions{display:flex;gap:12px;flex-wrap:wrap}
    .hidden{display:none}

    .map-canvas{
      position:relative;
      width:100%;
      min-height:2050px;
      background:#f8fafc;
      border:3px solid #e5e7eb;
      border-radius:24px;
      overflow:auto;
      padding:20px;
      margin-top:18px;
    }
    .map-block{
      position:absolute;
      width:120px;
      height:42px;
      min-width:38px;
      min-height:24px;
      border:3px solid #ddd;
      border-radius:14px;
      padding:6px;
      font-size:10px;
      background:white;
      writing-mode:horizontal-tb !important;
      text-orientation:initial !important;
      cursor:pointer;
      box-shadow:0 6px 14px #0001;
      overflow:hidden;
      resize:none;
      line-height:1.05;
    }
    .map-block b{font-size:15px}
    .map-block.h{
      width:120px;
      height:42px;
      writing-mode:horizontal-tb !important;
      text-orientation:initial !important;
    }
    .map-label{
      position:absolute;
      font-size:15px;
      font-weight:900;
      color:#111;
      background:#ffffffcc;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid #ddd;
    }



    .clean-map{
      position:relative;
      width:1680px;
      height: 2050px;
      background:#f8fafc;
      border:2px solid #e5e7eb;
      border-radius:22px;
      overflow:hidden;
    }
    .clean-aisle{
      position:absolute;
      background:#eef2f7;
      border:1px dashed #cbd5e1;
      border-radius:14px;
    }
    .editor-on .map-block{cursor:move}.editor-toolbar{margin:10px 0;padding:10px;background:#eef}
.clean-dock{
      position:absolute;
      width:90px;
      height:58px;
      background:#111827;
      color:white;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:900;
      box-shadow:0 8px 18px #0002;
    }

    .fixed-map{
      position:relative;
      width:1580px;
      height:1120px;
      background:#f8fafc;
      border-radius:22px;
      border:2px solid #e5e7eb;
      overflow:hidden;
    }
    .fixed-aisle{
      position:absolute;
      background:#eef2f7;
      border:1px dashed #cbd5e1;
      border-radius:14px;
    }
    .fixed-dock{
      position:absolute;
      width:82px;
      height:54px;
      background:#111827;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      font-weight:900;
      font-size:21px;
      box-shadow:0 8px 18px #0002;
    }

    .real-plan{
      position:relative;
      width:1460px;
      height:1040px;
      background:#f8fafc;
      border-radius:20px;
    }
    .aisle{
      position:absolute;
      background:#e5e7eb;
      border:1px dashed #cbd5e1;
      border-radius:14px;
      opacity:.9;
    }
    .dock-real{
      position:absolute;
      width:76px;
      height:54px;
      background:#111827;
      color:white;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:900;
      box-shadow:0 8px 18px #0002;
    }

    .dock{
      position:absolute;
      width:70px;
      height:44px;
      background:#e5e7eb;
      border:3px solid #111;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
    }
    .map-block.empty{background:#fff}
    .map-block.ok{background:#dcfce7;border-color:#16a34a}
    .map-block.mid{background:#fef3c7;border-color:#f59e0b}
    .map-block.full{background:#fee2e2;border-color:#dc2626}
    .map-block.reserved{background:#dbeafe;border-color:#2563eb}
    .map-block.blocked{background:#ede9fe;border-color:#7c3aed}
    .map-editor{
      border:2px solid #e5e7eb;
      background:#fff;
      border-radius:22px;
      padding:20px;
      margin:18px 0;
    }

    @media(max-width:900px){
      .grid2,.grid3,.grid4,.row{grid-template-columns:1fr}
      .rack-grid{grid-template-columns:repeat(4,1fr)}
      .tile{font-size:28px;min-height:140px}
      .topbar{display:block}
      .topbar .user{text-align:left;margin-top:8px}
    }
  </style>




<style>
#mapEditToolbar{
  position:fixed;
  left:18px;
  bottom:18px;
  z-index:999999;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  background:#111827;
  color:#fff;
  padding:10px;
  border-radius:14px;
  box-shadow:0 8px 24px #0004;
}
#mapEditToolbar button{
  border:0;
  border-radius:10px;
  padding:9px 12px;
  font-weight:900;
  cursor:pointer;
}
#mapEditToolbar .red{background:#d60000;color:white}
#mapEditToolbar .dark{background:#374151;color:white}
.map-editing .map-block,
.map-editing .fixed-aisle,
.map-editing .clean-aisle,
.map-editing .aisle,
.map-editing .fixed-dock,
.map-editing .clean-dock,
.map-editing .dock-real,
.map-editing .dock{
  cursor:move !important;
  user-select:none !important;
}
.map-selected{
  outline:4px solid #111827 !important;
  outline-offset:2px;
}
.map-resize-handle{
  position:absolute;
  right:-6px;
  bottom:-6px;
  width:14px;
  height:14px;
  background:#111827;
  border:2px solid white;
  border-radius:4px;
  z-index:999999;
  cursor:nwse-resize;
}
</style>


<style>
.map-edit-active .map-block,
.map-edit-active .clean-aisle,
.map-edit-active .clean-dock,
.map-edit-active .fixed-aisle,
.map-edit-active .fixed-dock,
.map-edit-active .aisle,
.map-edit-active .dock,
.map-edit-active .dock-real{
  cursor:move !important;
  user-select:none !important;
}
.map-edit-selected{
  outline:3px solid #111827 !important;
  outline-offset:2px !important;
}
.map-edit-handle{
  position:absolute;
  right:-8px;
  bottom:-8px;
  width:18px;
  height:18px;
  background:#d60000;
  border:2px solid white;
  border-radius:5px;
  z-index:999999;
  cursor:nwse-resize;
  box-shadow:0 2px 8px #0005;
}
.clean-map{transform-origin:top left;}
</style>

    const { data, error } = await traceSupabaseClient

      .maybeSingle();

    const remote = data.data;
    if(!remote || remote?._meta?.clientId === traceClientId){
      cloudStatus("✅ Ya estás al día", "ok"); return;
    }
    if(remote?._meta?.updatedAt === state._lastRemoteUpdatedAt){

async function initSupabaseSync(){
  try{
    if(!window.supabase){
      cloudStatus("⚠️ Supabase no cargado", "warn");
      return;
    }
    traceSupabaseClient = window.supabase.createClient(TRACE_SUPABASE_URL, TRACE_SUPABASE_KEY);
    traceCloudReady = true;
    cloudStatus("☁️ Conectado", "ok");

    // Comprobar cambios cada 15 segundos, SOLO si no hay ningún input activo
    setInterval(async ()=>{
      if(!state.user) return;
      if(!traceCloudReady || !traceSupabaseClient) return;
      // No sincronizar si el usuario está escribiendo en algún campo
      const active = document.activeElement;
      if(active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA" || active.tagName === "SELECT")) return;
      try{
        const { data, error } = await traceSupabaseClient
          .from("trace_state")
          .select("data,updated_at")
          .eq("id", TRACE_STATE_ID)
          .maybeSingle();
        if(error || !data || !data.data) return;
        const remote = data.data;
        if(!remote) return;
        if(remote._meta?.clientId === traceClientId) return;
        if(remote._meta?.updatedAt === state._lastRemoteUpdatedAt) return;
        traceApplyingRemote = true;
        if(applySharedState(remote)){
          state._lastRemoteUpdatedAt = remote._meta?.updatedAt;
          render();
          cloudStatus("🔄 Actualizado", "ok");
        }
        traceApplyingRemote = false;
      }catch(e){}
    }, 15000);

  }catch(err){
    console.error("No se pudo iniciar Supabase", err);
    traceCloudReady = false;
    cloudStatus("⚠️ Error Supabase", "error");
  }
}

function migrateProductCode(code){

    CAPD01:"P901", CAP001:"P905", MIX001:"P925", AG500:"P002A", AG1L:"P012", AGGAS:"P002B",

  };

}

  if(!obj || typeof obj !== "object") return obj;

  (s.albaranes||[]).forEach(a=>{

}

function recommendEntry(product, qty){
  return state.racks
    .filter(r => !r.reserved && !r.blocked)
    .filter(r => r.product===product || !r.product)
    .filter(r => r.capacity - r.occupied >= qty)
    .sort((a,b)=>{
      const sameA = a.product===product ? 0 : 1;
      const sameB = b.product===product ? 0 : 1;
      if(sameA!==sameB) return sameA-sameB;
      return (a.entryDate || "2999-12-31").localeCompare(b.entryDate || "2999-12-31");
    }).slice(0,3);
}
function recommendExit(product, qty){
  return state.racks
    .filter(r => r.product===product && r.occupied>=qty && !r.reserved && !r.blocked)
    .sort((a,b)=>(a.entryDate||"").localeCompare(b.entryDate||""))
    .slice(0,3);
}

function moveStock(product, rackId, qty, type, detail=""){
  qty = Number(qty);
  if(qty<=0 || qty%2!==0){ alert("La cantidad debe ser positiva y múltiplo de 2."); return false; }
  const r = state.racks.find(x=>x.id===rackId);
  if(!r){ alert("Estiba no encontrada"); return false; }
  if(r.reserved || r.blocked){ alert("Estiba reservada o bloqueada."); return false; }
  if(type==="entrada" || type==="descarga"){
    if(r.product && r.product!==product){ alert("No se permite mezclar productos."); return false; }
    if(r.occupied + qty > r.capacity){ alert("Capacidad superada."); return false; }
    r.product=product; r.occupied += qty; if(!r.entryDate) r.entryDate = new Date().toISOString().slice(0,10);
    addHistory(type, product, "", rackId, qty, detail);
  }else{
    if(r.product!==product){ alert("La estiba no contiene ese producto."); return false; }
    if(r.occupied < qty){ alert("No hay suficientes palets."); return false; }
    r.occupied -= qty;
    if(r.occupied===0){ r.product=""; r.entryDate=""; }
    addHistory(type, product, rackId, type==="carro" ? "Inbound" : "", -qty, detail);
  }
  save(); return true;
}
function addHistory(type, product, origin, dest, qty, detail=""){

function datePartsFromNow(){
  const d = new Date();
  return {
    date: d.toLocaleDateString("es-ES"),
    time: d.toLocaleTimeString("es-ES", {hour12:false}),
    iso: d.toISOString()
  };
}

function registerAlbaranRecord(data){
  if(!data || !data.deliveryNote || data.deliveryNote === "Sin albarán") return;
  if(!state.albaranes) state.albaranes = [];
  const sourceId = data.sourceId || `${data.type}_${data.deliveryNote}_${Date.now()}`;
  if(state.albaranes.some(a=>a.sourceId === sourceId)) return;
  const dt = datePartsFromNow();
  const lines = (data.lines || []).map(l=>({
    product:l.product,
    productName:productName(l.product),
    qty:Number(l.qty || 0),
    rack:l.rack || "",
    extra:!!l.extra,
    expected:Number(l.expected || l.qty || 0)
  })).filter(l=>l.qty>0);
  const totalPalets = lines.reduce((sum,l)=>sum + Number(l.qty || 0),0);
  const record = {
    id: Date.now() + Math.floor(Math.random()*1000),
    sourceId,
    date: dt.date,
    time: dt.time,
    iso: dt.iso,
    type:data.type || "Operación",
    dock:data.dock || "",
    plate:data.plate || "",
    deliveryNote:String(data.deliveryNote || "").trim().toUpperCase(),
    operator:data.operator || state.user?.name || "Sistema",
    lines,
    totalPalets,
    status:"Completado"
  };
  state.albaranes.unshift(record);
  addHistory("registro albarán", "", "", record.dock, totalPalets, `${record.type} ${record.deliveryNote} · ${record.plate} · ${totalPalets} palets`);
}

function albaranSummary(a){

function xmlEscape(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&apos;");
}

function xlsxColName(n){
  let s="";
  while(n>=0){
    s = String.fromCharCode((n % 26) + 65) + s;
    n = Math.floor(n / 26) - 1;
  }
  return s;
}

function makeSheetXml(rows){
  const sheetRows = rows.map((row, rIdx)=>{
    const cells = row.map((value, cIdx)=>{
      const ref = xlsxColName(cIdx) + (rIdx + 1);
      const isNumber = typeof value === "number" && Number.isFinite(value);
      if(isNumber){
        return `<c r="${ref}"><v>${value}</v></c>`;
      }
      return `<c r="${ref}" t="inlineStr"><is><t>${xmlEscape(value)}</t></is></c>`;
    }).join("");
    return `<row r="${rIdx+1}">${cells}</row>`;
  }).join("");
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <sheetViews><sheetView workbookViewId="0"><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/></sheetView></sheetViews>
  <cols>
    <col min="1" max="1" width="14" customWidth="1"/>
    <col min="2" max="2" width="12" customWidth="1"/>
    <col min="3" max="7" width="18" customWidth="1"/>
    <col min="8" max="8" width="38" customWidth="1"/>
    <col min="9" max="11" width="12" customWidth="1"/>
  </cols>
  <sheetData>${sheetRows}</sheetData>
</worksheet>`;
}

function crc32Array(bytes){
  let crc = -1;
  for(let i=0;i<bytes.length;i++){
    crc ^= bytes[i];
    for(let j=0;j<8;j++) crc = (crc >>> 1) ^ (0xEDB88320 & -(crc & 1));
  }
  return (crc ^ -1) >>> 0;
}

function strToBytes(str){
  return new TextEncoder().encode(str);
}

function u16(n){
  return new Uint8Array([n & 255, (n >>> 8) & 255]);
}

function u32(n){
  return new Uint8Array([n & 255, (n >>> 8) & 255, (n >>> 16) & 255, (n >>> 24) & 255]);
}

function concatBytes(parts){
  const total = parts.reduce((s,p)=>s+p.length,0);
  const out = new Uint8Array(total);
  let offset = 0;
  parts.forEach(p=>{ out.set(p, offset); offset += p.length; });
  return out;
}

function makeZip(files){
  const localParts = [];
  const centralParts = [];
  let offset = 0;

  files.forEach(file=>{
    const nameBytes = strToBytes(file.name);
    const dataBytes = strToBytes(file.content);
    const crc = crc32Array(dataBytes);

    const localHeader = concatBytes([
      u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0),
      u32(crc), u32(dataBytes.length), u32(dataBytes.length),
      u16(nameBytes.length), u16(0), nameBytes
    ]);

    localParts.push(localHeader, dataBytes);

    const centralHeader = concatBytes([
      u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0),
      u32(crc), u32(dataBytes.length), u32(dataBytes.length),
      u16(nameBytes.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset), nameBytes
    ]);

    centralParts.push(centralHeader);
    offset += localHeader.length + dataBytes.length;
  });

  const centralDir = concatBytes(centralParts);
  const localData = concatBytes(localParts);
  const endRecord = concatBytes([
    u32(0x06054b50), u16(0), u16(0), u16(files.length), u16(files.length),
    u32(centralDir.length), u32(localData.length), u16(0)
  ]);

  return concatBytes([localData, centralDir, endRecord]);
}

function buildXlsxBlob(rows){
  const files = [
    {name:"[Content_Types].xml", content:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
  <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
</Types>`},
    {name:"_rels/.rels", content:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`},
    {name:"xl/workbook.xml", content:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <sheets><sheet name="Registro Albaranes" sheetId="1" r:id="rId1"/></sheets>
</workbook>`},
    {name:"xl/_rels/workbook.xml.rels", content:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
</Relationships>`},
    {name:"xl/worksheets/sheet1.xml", content:makeSheetXml(rows)}
  ];
  return new Blob([makeZip(files)], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
}

function exportAlbaranesExcel(){
  const rows = [];
  rows.push(["Fecha","Hora","Tipo","Muelle","Matrícula","Albarán","Operario","Producto","Palets","Estiba","Estado"]);
  (state.albaranes || []).slice().reverse().forEach(a=>{
    (a.lines || []).forEach(l=>{
      rows.push([a.date,a.time,a.type,a.dock,a.plate,a.deliveryNote,a.operator,l.productName || productName(l.product),Number(l.qty || 0),l.rack || "",a.status || "Completado"]);
    });
  });
  if(rows.length===1){ alert("No hay albaranes registrados para exportar."); return; }
  const blob = buildXlsxBlob(rows);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `registro_albaranes_${new Date().toISOString().slice(0,10)}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function createUnloadPlan(){
  const dock = document.getElementById("dock").value;
  const plate = document.getElementById("plate").value.trim().toUpperCase();
  const deliveryNote = document.getElementById("deliveryNote").value.trim().toUpperCase();
  if(!plate){ alert("Introduce la matrícula del camión."); return; }
  if(!deliveryNote){ alert("Introduce el albarán de la descarga."); return; }

  const lines = [];
  for(let i=1;i<=10;i++){
    const productEl = document.getElementById("prod"+i);
    const qtyEl = document.getElementById("qty"+i);
    if(!productEl || !qtyEl) continue;
    const product = productEl.value;
    const qty = Number(qtyEl.value);
    if(qty>0){
      if(qty % 2 !== 0){ alert("Las cantidades deben ser múltiplos de 2 palets."); return; }
      lines.push({id: Date.now()+i, product, expected: qty, received: qty, done:false, rack:""});
    }
  }

  if(!lines.length){ alert("Añade al menos un producto con cantidad."); return; }

  if(!state.unloadPlans) state.unloadPlans = [];

  state.unloadPlans.push({
    id: Date.now(),
    dock,
    plate,
    deliveryNote,
    lines,
    status:"pendiente",
    createdBy: state.user.name,
    createdAt: now()
  });

  addHistory("crear descarga", "", "", dock, 0, `Matrícula ${plate}. Albarán ${deliveryNote}. Líneas: ${lines.length}`);
  save();
  pushToCloud();
  alert("Descarga creada para " + dock + " / " + plate + " / Albarán " + deliveryNote);
  
}

  document.getElementById("unloadWorkBox").innerHTML = `

function validateUnloadRack(planId, lineId){
  const selected = document.getElementById("selectedRack")?.value;
  const scanned = document.getElementById("scannedRack")?.value.trim();
  const msg = document.getElementById("unloadValidationMsg");
  const btn = document.getElementById("confirmUnloadBtn");

  if(!selected){
    msg.innerHTML = `<div class="alert">Primero selecciona una estiba del Top 3.</div>`;
    btn.disabled = true; btn.style.opacity = ".45"; return;
  }

  if(!scanned){
    msg.innerHTML = `<div class="alert">Introduce o escanea la estiba real.</div>`;
    btn.disabled = true; btn.style.opacity = ".45"; return;
  }

  if(scanned !== selected){
    msg.innerHTML = `<div class="alert">❌ ERROR: estiba introducida ${scanned}, pero la seleccionada es ${selected}. No se puede confirmar.</div>`;
    btn.disabled = true; btn.style.opacity = ".45"; return;
  }

  msg.innerHTML = `<div class="ok">✅ Estiba correcta. Puedes confirmar ubicación.</div>`;
  btn.disabled = false; btn.style.opacity = "1";

function confirmUnloadLine(planId, lineId){
  const plan = (state.unloadPlans || []).find(p=>p.id===planId);
  const line = plan?.lines.find(l=>l.id===lineId);
  const rack = document.getElementById("selectedRack")?.value;
  const scanned = document.getElementById("scannedRack")?.value.trim();

  if(!plan || !line){ alert("Línea no encontrada."); return; }
  if(!rack || scanned !== rack){ alert("No se puede confirmar. La estiba no está validada."); return; }

  const unloadDetail = line.extra
    ? `Descarga ${plan.dock} matrícula ${plan.plate} · Albarán ${plan.deliveryNote || "Sin albarán"} · EXTRA NO PREVISTO`
    : (line.received !== line.expected ? `Descarga ${plan.dock} matrícula ${plan.plate} · Albarán ${plan.deliveryNote || "Sin albarán"} · Diferencia previsto ${line.expected} / real ${line.received}` : `Descarga ${plan.dock} matrícula ${plan.plate} · Albarán ${plan.deliveryNote || "Sin albarán"}`);

  if(moveStock(line.product, rack, line.received, "descarga", unloadDetail)){
    line.done = true;
    line.rack = rack;

    if(plan.lines.every(l=>l.done)){
      plan.status = "completada";
      plan.completedAt = now();
      registerAlbaranRecord({
        type:"Descarga",
        dock:plan.dock,
        plate:plan.plate || "Sin matrícula",
        deliveryNote:plan.deliveryNote || "Sin albarán",
        operator:state.user?.name || plan.createdBy || "Sistema",
        lines:plan.lines.map(l=>({product:l.product, qty:Number(l.received || l.expected || 0), rack:l.rack || "", extra:!!l.extra, expected:Number(l.expected || 0)})),
        sourceId:"descarga_" + plan.id
      });
    }

    save();

    if(plan.status === "completada"){
      pushToCloud();
      alert(`Descarga completada. Último producto ubicado: ${productName(line.product)} → Estiba ${rack}`);
      render();
    }else{
      const pending = plan.lines.filter(l=>!l.done).length;
      pushToCloud();
      alert(`Producto ubicado. ${productName(line.product)} → Estiba ${rack}. Quedan ${pending} producto(s) por confirmar.`);
      openUnloadPlan();
      const workBox = document.getElementById("unloadWorkBox");
      if(workBox){
        workBox.innerHTML = `<div class="ok">✅ Producto confirmado. Continúa con el siguiente producto pendiente de esta misma descarga.</div>`;
      }
    }
  }
}

function cancelCartRequest(id){
  const req = state.cartRequests.find(r=>r.id===id);
  if(!req){ alert("Solicitud no encontrada."); return; }

  const pending = req.requested - req.done;
  const reason = prompt(
    `Motivo de cancelación para ${productName(req.product)}\n` +
    `Carros realizados: ${req.done}/${req.requested}\n` +
    `Carros pendientes que se cancelan: ${pending}`,
    "Cambio de planificación / producción cancelada"
  );

  if(reason === null) return;

  if(!reason.trim()){
    alert("Debes indicar un motivo para cancelar la solicitud.");
    return;
  }

  req.status = "cancelada";
  req.cancelledAt = now();
  req.cancelledBy = state.user.name;
  req.cancelReason = reason.trim();

  addHistory(
    "cancelación carros",
    req.product,
    "",
    "Inbound",
    0,
    `Solicitud cancelada. Realizados ${req.done}/${req.requested}. Pendientes cancelados ${pending}. Motivo: ${reason.trim()}`
  );

  save();
  alert("Solicitud de carros cancelada. Queda registrada en historial.");
  
}

function confirmCarro(id){
  const req=state.cartRequests.find(r=>r.id===id);
  const rack=document.getElementById("selectedRack")?.value;
  const scanned=document.getElementById("scannedRack")?.value.trim();

  if(!rack){
    alert("Primero busca y selecciona una estiba FIFO.");
    return;
  }

  if(scanned !== rack){
    alert("No se puede confirmar. La estiba escaneada/introducida no coincide con la estiba seleccionada.");
    return;
  }

  if(moveStock(req.product,rack,24,"carro",`Carro ${req.done+1}/${req.requested}`)){
    req.done += 1;
    if(req.done>=req.requested) req.status="completada";
    save();
    pushToCloud();
    alert("Carro confirmado. Se han descontado 24 palets de la estiba " + rack);
    render();
  }
}

function saveRackEdit(){
  const id = document.getElementById("editRackId").value;
  const r = state.racks.find(x=>x.id===id);
  if(!r) return;

  const status = document.getElementById("editStatus").value;
  const occupied = Number(document.getElementById("editOccupied").value);
  const capacity = Number(document.getElementById("editCapacity").value);

  if(capacity <= 0){ alert("Capacidad no válida"); return; }
  if(occupied < 0 || occupied > capacity){ alert("Palets actuales no válidos"); return; }

  r.capacity = capacity;
  r.occupied = occupied;
  r.product = occupied > 0 ? document.getElementById("editProduct").value : "";
  r.zone = document.getElementById("editZone").value;
  r.reserved = status === "reservada";
  r.blocked = status === "bloqueada";
  r.mapX = Number(document.getElementById("editMapX").value);
  r.mapY = Number(document.getElementById("editMapY").value);

  addHistory("editar estiba", r.product, r.id, "", 0, `Estiba ${r.id} editada desde mapa campa`);
  save();
  
}

function inventoryCheck(){
  const rack=document.getElementById("rack").value.trim();
  const real=Number(document.getElementById("real").value);
  const product=document.getElementById("invProduct").value;
  const r=state.racks.find(x=>String(x.id)===String(rack));

  if(!r){ alert("Estiba no encontrada."); return; }
  if(!Number.isFinite(real) || real < 0){ alert("Cantidad real no válida."); return; }
  if(real > Number(r.capacity)){ alert("La cantidad real no puede superar la capacidad de la estiba."); return; }

  const beforeProduct = r.product;
  const beforeQty = Number(r.occupied || 0);

  r.occupied = real;
  r.product = real > 0 ? product : "";
  if(real > 0 && !r.entryDate) r.entryDate = new Date().toISOString().slice(0,10);
  if(real === 0) r.entryDate = "";

  const diff = real - beforeQty;
  const detail = `Corrección ajuste inventario estiba ${rack}: ${productName(beforeProduct)} ${beforeQty} → ${productName(r.product)} ${real}`;

  addHistory("inventario", r.product, rack, "", diff, detail);

  if(diff !== 0 || beforeProduct !== r.product){
    state.incidents.unshift({
      id:Date.now(),
      ts:now(),
      user:state.user.name,
      type:"Corrección ajuste inventario",
      rack,
      product:r.product,
      qty:diff,
      status:"resuelta",
      detail
    });
  }

  save();
  pushToCloud();
  alert("Ajuste de inventario guardado. El cambio ya aparece en Mapa Campa y Dashboard.");
  render();
}

function getRackHistory(rack){
  const key = String(rack).trim();
  const inText = (value)=>String(value || "").toLowerCase().includes(`estiba ${key}`.toLowerCase());

  const fromHistory = (state.history || []).filter(h=>
    String(h.origin || "") === key ||
    String(h.dest || "") === key ||
    inText(h.detail)
  );

  const fromIncidents = (state.incidents || [])
    .filter(i=>String(i.rack || "") === key)
    .map(i=>({
      id: `inc_${i.id}`,
      ts: i.ts,
      user: i.user,
      type: `incidencia ${i.status || ""}`.trim(),
      product: i.product,
      origin: i.rack,
      dest: "",
      qty: i.qty,
      detail: `${i.type || "Incidencia"}${i.detail ? " · " + i.detail : ""}`
    }));

  const all = [...fromHistory, ...fromIncidents];
  const unique = [];
  const seen = new Set();
  all.forEach(item=>{
    const k = String(item.id || `${item.ts}_${item.type}_${item.origin}_${item.dest}_${item.qty}_${item.detail}`);
    if(!seen.has(k)){ seen.add(k); unique.push(item); }
  });

  return unique.sort((a,b)=>String(b.ts || "").localeCompare(String(a.ts || "")));
}

function calcCampaignDestination(taskId){
  const task = (state.campaignTasks || []).find(t=>t.id===taskId);
  if(!task){ alert("Tarea no encontrada"); return; }

  // Buscar destinos fuera del origen, no reservados y no bloqueados, con mismo producto o vacíos.
  tempOptions = state.racks
    .filter(r=>r.id!==task.origin)
    .filter(r=>!r.reserved && !r.blocked)
    .filter(r=>r.product===task.product || !r.product)
    .filter(r=>r.capacity-r.occupied >= task.quantity)
    .sort((a,b)=>{
      const sameA = a.product===task.product ? 0 : 1;
      const sameB = b.product===task.product ? 0 : 1;
      if(sameA!==sameB) return sameA-sameB;
      return (a.entryDate || "2999-12-31").localeCompare(b.entryDate || "2999-12-31");
    })
    .slice(0,3);

  const recommended = tempOptions[0]?.id || "";

  document.getElementById("campaignMoveBox").innerHTML = `
    <div class="card" style="box-shadow:none;border:2px solid #eee;margin-top:20px">
      <h2>Movimiento zona restringida</h2>

      <div class="row">
        <div>
          <div class="small">Producto</div>
          <div class="value">${productName(task.product)}</div>
        </div>
        <div>
          <div class="small">Cantidad</div>
          <div class="value">${task.quantity} palets</div>
        </div>
      </div>

      <div class="alert">
        Origen a vaciar: <b>Estiba ${task.origin}</b>. Primero introduce/escanea origen, luego destino.
      </div>

      <h2>Top 3 destinos recomendados</h2>
      ${optionHtml(tempOptions)}

      <input type="hidden" id="activeCampaignTask" value="${task.id}"/>

      <div class="row" style="margin-top:18px">
        <div>
          <label>Escanear / introducir estiba origen</label>
          <input id="campaignOriginScan" placeholder="Debe ser ${task.origin}"/>
        </div>
        <div>
          <label>Escanear / introducir estiba destino</label>
          <input id="campaignDestScan" placeholder="Ejemplo: ${recommended}"/>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-blue" onclick="validateCampaignMove(${task.id})">VALIDAR ORIGEN / DESTINO</button>
        <button class="btn btn-green" id="confirmCampaignMoveBtn" onclick="confirmCampaignMove(${task.id})" disabled style="opacity:.45">CONFIRMAR MOVIMIENTO</button>
      </div>

      <div id="campaignValidationMsg"></div>
    </div>
  `;
}

function validateCampaignMove(taskId){
  const task = (state.campaignTasks || []).find(t=>t.id===taskId);
  const selectedDest = document.getElementById("selectedRack")?.value;
  const originScan = document.getElementById("campaignOriginScan")?.value.trim();
  const destScan = document.getElementById("campaignDestScan")?.value.trim();
  const msg = document.getElementById("campaignValidationMsg");
  const btn = document.getElementById("confirmCampaignMoveBtn");

  if(!task || !selectedDest){
    msg.innerHTML = `<div class="alert">Selecciona primero un destino recomendado.</div>`;
    btn.disabled = true; btn.style.opacity = ".45"; return;
  }

  if(originScan !== task.origin){
    msg.innerHTML = `<div class="alert">❌ ERROR origen: has introducido ${originScan || "-"}, pero el origen debe ser ${task.origin}.</div>`;
    btn.disabled = true; btn.style.opacity = ".45"; return;
  }

  if(destScan !== selectedDest){
    msg.innerHTML = `<div class="alert">❌ ERROR destino: has introducido ${destScan || "-"}, pero el destino seleccionado es ${selectedDest}.</div>`;
    btn.disabled = true; btn.style.opacity = ".45"; return;
  }

  msg.innerHTML = `<div class="ok">✅ Origen y destino correctos. Ya puedes confirmar el movimiento.</div>`;
  btn.disabled = false; btn.style.opacity = "1";
}

function confirmCampaignMove(taskId){
  const task = (state.campaignTasks || []).find(t=>t.id===taskId);
  const selectedDest = document.getElementById("selectedRack")?.value;
  const originScan = document.getElementById("campaignOriginScan")?.value.trim();
  const destScan = document.getElementById("campaignDestScan")?.value.trim();

  if(!task || originScan !== task.origin || destScan !== selectedDest){
    alert("No se puede confirmar. Origen/destino no validados.");
    return;
  }

  const origin = state.racks.find(r=>r.id===task.origin);
  const dest = state.racks.find(r=>r.id===selectedDest);

  if(!origin || !dest){ alert("Origen o destino no encontrado."); return; }
  if(dest.reserved || dest.blocked){ alert("Destino reservado o bloqueado."); return; }
  if(dest.product && dest.product !== task.product){ alert("El destino tiene otro producto. No se permite mezclar."); return; }
  if(dest.capacity - dest.occupied < task.quantity){ alert("Destino sin capacidad suficiente."); return; }

  // Mover todo el stock de la estiba origen al destino.
  dest.product = task.product;
  dest.occupied += task.quantity;
  if(!dest.entryDate) dest.entryDate = origin.entryDate || new Date().toISOString().slice(0,10);

  origin.occupied = 0;
  origin.product = "";
  origin.entryDate = "";
  origin.blocked = false;
  origin.reserved = true;

  task.status = "completada";
  task.destination = dest.id;
  task.completedAt = now();
  task.completedBy = state.user.name;

  addHistory("movimiento zona restringida", task.product, origin.id, dest.id, task.quantity, `Zona restringida ${task.campaignName}. Origen liberado y reservado.`);
  updateCampaignStatus(task.campaignId);

  save();
  pushToCloud();
  alert(`Movimiento confirmado. La estiba ${origin.id} queda libre y reservada para zona restringida.`);
  
}

function updateCampaignStatus(campaignId){
  const pending = (state.campaignTasks || []).some(t=>t.campaignId===campaignId && t.status==="pendiente");
  const campaign = state.campaigns.find(c=>c.id===campaignId);
  if(campaign && !pending) campaign.status = "zona liberada";
}

function createCampaign(){
  const name=document.getElementById("name").value;
  const from=Number(document.getElementById("from").value);
  const to=Number(document.getElementById("to").value);
  const campaignId = Date.now();

  state.campaigns.push({id:campaignId,name,from,to,status:"pendiente liberar"});

  let created = 0;

  for(let i=from;i<=to;i++){
    const r=state.racks.find(x=>x.id===String(i));
    if(!r) continue;

    // Si la estiba tiene producto, no se bloquea aún como reservada final:
    // queda pendiente de mover para zona restringida.
    if(r.product && r.occupied > 0){
      state.campaignTasks.push({
        id: Date.now()+created,
        campaignId,
        campaignName: name,
        origin: r.id,
        product: r.product,
        quantity: r.occupied,
        status: "pendiente",
        destination: "",
        createdAt: now()
      });
      r.blocked = true; // bloqueada para que no se use en FIFO normal
      created++;
    } else {
      // Si está vacía, se reserva directamente.
      r.reserved = true;
    }
  }

  addHistory("zona restringida", "", String(from), String(to), 0, `Zona restringida ${name}. Tareas generadas: ${created}`);
  save();
  alert(`Zona restringida creada. Tareas de movimiento generadas: ${created}. Las estibas vacías quedan reservadas y las ocupadas quedan bloqueadas hasta mover el producto.`);
  
}
